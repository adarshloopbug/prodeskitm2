<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash-Flow Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header & Alerts -->
        <header>
            <h1>Cash-Flow</h1>
            <div class="header-actions">
                <button id="toggleCurrencyBtn" class="btn secondary-btn">
                    <i class='bx bx-transfer'></i> <span id="currencySymbolLabel">USD</span>
                </button>
                <button id="downloadPdfBtn" class="btn secondary-btn">
                    <i class='bx bxs-file-pdf'></i> Export
                </button>
            </div>
        </header>

        <div id="alertBanner" class="alert-banner hidden">
            <i class='bx bx-error-circle'></i> Critical: Remaining balance is below 10% of total salary!
        </div>
        <div id="errorBanner" class="error-banner hidden">
            <i class='bx bx-info-circle'></i> <span id="errorMsg"></span>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel: Inputs & Stats -->
            <div class="left-panel">
                <!-- Salary Input Section -->
                <div class="card glass-card">
                    <h2>Total Salary</h2>
                    <form id="salaryForm">
                        <div class="input-group">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="salaryInput" placeholder="Enter your salary" min="1" step="0.01">
                        </div>
                        <button type="submit" class="btn primary-btn">Set Salary</button>
                    </form>
                </div>

                <!-- Expense Input Section -->
                <div class="card glass-card">
                    <h2>Log Expense</h2>
                    <form id="expenseForm">
                        <div class="input-group">
                            <input type="text" id="expenseNameInput" placeholder="Expense Name">
                        </div>
                        <div class="input-group">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="expenseAmountInput" placeholder="Amount" min="0.01" step="0.01">
                        </div>
                        <button type="submit" class="btn primary-btn">Add Expense</button>
                    </form>
                </div>
            </div>

            <!-- Middle Panel: Visualization & Summary -->
            <div class="middle-panel">
                <div class="card glass-card summary-card">
                    <div class="summary-item">
                        <p>Total Salary</p>
                        <h3 id="displaySalary">$0.00</h3>
                    </div>
                    <div class="summary-item">
                        <p>Total Expenses</p>
                        <h3 id="displayExpenses">$0.00</h3>
                    </div>
                    <div class="summary-item balance-section" id="balanceSection">
                        <p>Remaining Balance</p>
                        <h1 id="displayBalance">$0.00</h1>
                    </div>
                </div>

                <div class="card glass-card chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <!-- Right Panel: Expense List -->
            <div class="right-panel">
                <div class="card glass-card list-card">
                    <h2>Expense List</h2>
                    <ul id="expenseList" class="expense-list">
                        <!-- Dynamic list items will be injected here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
